<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Business Accounting System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f5f5;
}

.sidebar{
    width:240px;
    height:100vh;
    background:#212529;
    position:fixed;
    left:0;
    top:0;
    color:white;
}

.sidebar h3{
    text-align:center;
    padding:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px 20px;
}

.sidebar a:hover{
    background:#0d6efd;
}

.content{
    margin-left:240px;
    padding:30px;
}

</style>

</head>

<body>

{% if user.is_authenticated %}

<div class="sidebar">

<h3>Accounting</h3>

<a href="/">Dashboard</a>
<a href="#">Customers</a>
<a href="#">Suppliers</a>
<a href="#">Products</a>
<a href="#">Sales</a>
<a href="#">Purchases</a>
<a href="#">Expenses</a>
<a href="#">Reports</a>
<a href="/accounts/profile/">Profile</a>
<a href="/accounts/logout/">Logout</a>

</div>

<div class="content">

{% block content %}

{% endblock %}

</div>

{% else %}

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="/">
Business Accounting System
</a>

<div>

<a href="/accounts/login/" class="btn btn-outline-light me-2">
Login
</a>

<a href="/accounts/register/" class="btn btn-success">
Register
</a>

</div>

</div>

</nav>

<div class="container mt-5">

{% block guestcontent %}

{% endblock %}

</div>

{% endif %}

</body>
</html>

{% extends "base.html" %}

{% block title %}Change Password{% endblock %}

{% block content %}

<h1 class="mb-4">Change Password</h1>

<div class="card shadow">
    <div class="card-body">

        <p class="text-success">
            If you can see this message, the template is loading correctly.
        </p>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-primary">
                Change Password
            </button>

        </form>

    </div>
</div>

{% endblock %}

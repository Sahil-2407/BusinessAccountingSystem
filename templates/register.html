{% extends "base.html" %}

{% block guestcontent %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">
                <h3 class="text-center">Create Account</h3>
            </div>

            <div class="card-body">

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-info">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">
                        <label>Username</label>
                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label>Email Address</label>
                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Register
                    </button>

                </form>

                <hr>

                <p class="text-center">
                    Already have an account?
                    <a href="/accounts/login/">Login</a>
                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}

{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>Balance Sheet</h3>

</div>

<div class="card-body">

<div class="row">

<div class="col-md-6">

<h4>Assets</h4>

<table class="table table-bordered">

<tr>
<th>Cash</th>
<td>₹ {{ cash }}</td>
</tr>

<tr>
<th>Inventory</th>
<td>₹ {{ inventory }}</td>
</tr>

<tr class="table-primary">
<th>Total Assets</th>
<td>₹ {{ assets }}</td>
</tr>

</table>

</div>

<div class="col-md-6">

<h4>Liabilities & Capital</h4>

<table class="table table-bordered">

<tr>
<th>Liabilities</th>
<td>₹ {{ liabilities }}</td>
</tr>

<tr>
<th>Capital</th>
<td>₹ {{ capital }}</td>
</tr>

<tr class="table-success">
<th>Total</th>
<td>₹ {{ assets }}</td>
</tr>

</table>

</div>

</div>

</div>

</div>

</div>

{% endblock %}

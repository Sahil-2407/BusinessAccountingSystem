{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>

<i class="bi bi-bank"></i>

Balance Sheet

</h2>

<a href="{% url 'reports_home' %}"
class="btn btn-secondary">

Back

</a>

</div>

<div class="row">

<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-success text-white">

Assets

</div>

<table class="table mb-0">

<tr>

<th>Cash</th>

<td class="text-end">

₹ {{ cash }}

</td>

</tr>

<tr>

<th>Inventory</th>

<td class="text-end">

₹ {{ inventory }}

</td>

</tr>

<tr class="table-success">

<th>Total Assets</th>

<th class="text-end">

₹ {{ assets }}

</th>

</tr>

</table>

</div>

</div>

<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-danger text-white">

Liabilities & Capital

</div>

<table class="table mb-0">

<tr>

<th>Liabilities</th>

<td class="text-end">

₹ {{ liabilities }}

</td>

</tr>

<tr>

<th>Capital</th>

<td class="text-end">

₹ {{ capital }}

</td>

</tr>

<tr class="table-danger">

<th>Total</th>

<th class="text-end">

₹ {{ liabilities|add:capital }}

</th>

</tr>

</table>

</div>

</div>

</div>

</div>

{% endblock %}

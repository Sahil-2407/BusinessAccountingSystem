{% extends "base.html" %}

{% block content %}

<h2>Cash Book</h2>

<a href="{% url 'add_cashbook' %}" class="btn btn-success mb-3">

Add Cash Entry

</a>

<table class="table table-bordered">

<thead class="table-dark">

<tr>

<th>Date</th>
<th>Receipt</th>
<th>Payment</th>
<th>Balance</th>
<th>Remarks</th>

</tr>

</thead>

<tbody>

{% for item in cashbooks %}

<tr>

<td>{{ item.date }}</td>
<td>{{ item.receipt }}</td>
<td>{{ item.payment }}</td>
<td>{{ item.balance }}</td>
<td>{{ item.remarks }}</td>

</tr>

{% empty %}

<tr>

<td colspan="5">No Cash Book Entries</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}

{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

<h2 class="mb-4">
<i class="bi bi-journal-bookmark"></i>
Accounting Dashboard
</h2>

<div class="row">

    <div class="col-md-4 mb-4">

        <div class="card shadow">

            <div class="card-body text-center">

                <i class="bi bi-book display-4 text-primary"></i>

                <h4 class="mt-3">Ledger</h4>

                <p>View all ledger transactions.</p>

                <a href="{% url 'ledger_list' %}"
                   class="btn btn-primary">

                    Open Ledger

                </a>

            </div>

        </div>

    </div>

    <div class="col-md-4 mb-4">

        <div class="card shadow">

            <div class="card-body text-center">

                <i class="bi bi-journal-text display-4 text-success"></i>

                <h4 class="mt-3">Journal</h4>

                <p>View journal entries.</p>

                <a href="{% url 'journal_list' %}"
                   class="btn btn-success">

                    Open Journal

                </a>

            </div>

        </div>

    </div>

    <div class="col-md-4 mb-4">

        <div class="card shadow">

            <div class="card-body text-center">

                <i class="bi bi-cash-stack display-4 text-warning"></i>

                <h4 class="mt-3">Cash Book</h4>

                <p>View receipts and payments.</p>

                <a href="{% url 'cashbook_list' %}"
                   class="btn btn-warning">

                    Open Cash Book

                </a>

            </div>

        </div>

    </div>

</div>

</div>

{% endblock %}
